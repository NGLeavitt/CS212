<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Recipe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/group_5_recipe_tracker/style.css">
</head>
<body>
  <nav class="navbar custom-navbar justify-content-center text-center">
    <h1 class="fw-bold text-uppercase mb-0">New Documentation</h1>
  </nav>

  <div class="container mt-5 text-center" style="max-width: 650px;">
    <div class="card p-4">
      <div class="row g-3">
        <div class="col-12"><input type="text" id="f-name" class="form-control" placeholder="Recipe Title"></div>
        <div class="col-6"><input type="text" id="f-cat" class="form-control" placeholder="Category"></div>
        <div class="col-6"><input type="text" id="f-time" class="form-control" placeholder="Cook Time"></div>
        
        <div class="col-12 mt-4 text-center">
          <p class="fw-bold mb-2">INGREDIENTS <button onclick="addField('ing')" class="btn btn-sm btn-outline-custom">+</button></p>
          <div id="ing-area"><input type="text" id="ing1" class="form-control mb-2"></div>
        </div>

        <div class="col-12 mt-4 text-center">
          <p class="fw-bold mb-2">INSTRUCTIONS <button onclick="addField('ins')" class="btn btn-sm btn-outline-custom">+</button></p>
          <div id="ins-area"><input type="text" id="ins1" class="form-control mb-2"></div>
        </div>
      </div>
      <button class="btn btn-custom mt-5 w-100" onclick="SaveRecipe()">Commit to Archive</button>
      <button class="btn btn-link text-dark mt-2" onclick="window.location.href='index.html'">Cancel</button>
    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="/group_5_recipe_tracker/app.js"></script>
</body>
</html>
