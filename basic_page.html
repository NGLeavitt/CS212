<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Entry</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/group_5_recipe_tracker/style.css">
</head>
<body>
  <nav class="navbar custom-navbar justify-content-center text-center">
    <h1 class="fw-bold">NEW DOCUMENTATION</h1>
  </nav>

  <div class="container mt-5 text-center" style="max-width: 800px;">
    <div class="card p-4">
      <div class="row g-3">
        <div class="col-md-12"><input type="text" id="f-name" class="form-control" placeholder="Recipe Name"></div>
        <div class="col-md-6"><input type="text" id="f-cat" class="form-control" placeholder="Category"></div>
        <div class="col-md-6"><input type="text" id="f-time" class="form-control" placeholder="Cook Time"></div>
        
        <div class="col-md-12 mt-4">
          <h5 class="text-uppercase">Ingredients <button onclick="AddIng()" class="btn btn-sm btn-wes-outline">+</button></h5>
          <div id="ing-area"><input type="text" id="ing1" class="form-control mb-2"></div>
        </div>

        <div class="col-md-12 mt-4">
          <h5 class="text-uppercase">Instructions <button onclick="AddIns()" class="btn btn-sm btn-wes-outline">+</button></h5>
          <div id="ins-area"><input type="text" id="ins1" class="form-control mb-2"></div>
        </div>
      </div>
      <button class="btn btn-wes mt-5 w-50 mx-auto" onclick="SaveNew()">Finalize Entry</button>
    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="/group_5_recipe_tracker/app.js"></script>
</body>
</html>
