<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recipe Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/group_5_recipe_tracker/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
  <nav class="navbar custom-navbar justify-content-center text-center">
    <div>
      <h1 class="fw-bold mb-0">RECIPE TRACKER</h1>
      <small class="text-uppercase">Official Catalog</small>
    </div>
  </nav>

  <div class="container mt-5 text-center flex-grow-1">
    <div class="row justify-content-center mb-5">
      <div class="col-md-6">
        <input type="text" id="search-input" class="form-control mb-3" placeholder="Search the catalog...">
        <div class="d-flex justify-content-center gap-3">
          <button class="btn btn-custom px-4" onclick="window.location.href='add_recipe.html'">Add Recipe</button>
          <button class="btn btn-outline-custom px-4" onclick="window.location.href='stats.html'">Statistics</button>
        </div>
      </div>
    </div>

    <div class="row justify-content-center" id="recipes-dashboard"></div>
  </div>

  <footer class="text-center py-4">
    <p class="mb-0">System Version 1.0 — 2026</p>
  </footer>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="/group_5_recipe_tracker/app.js"></script>
</body>
</html>
