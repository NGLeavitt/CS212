<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Tracker Dashboard</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .custom-navbar {
      background-color: #FFD966;
      color: #5D4037;
    }
    .custom-navbar .navbar-brand {
      color: #5D4037;
    }
    .custom-navbar .btn-outline-dark {
      color: #5D4037;
      border-color: #5D4037;
    }

    .add-btn {
      background-color: #FF7F50;
      color: #FFF5E1;
      border: none;
    }
    .add-btn:hover {
      background-color: #FF6347;
      color: #FFF5E1;
    }

    .recipe-title-bar {
      background-color: #FF6347;
      color: #FFF5E1;
      padding: 8px;
      font-weight: bold;
      text-align: center;
    }

    /* Recipies */
    .card {
      background-color: #FFF5E1;
      color: #5D4037;
    }

    .card-stats {
      background-color: #F6E2B3;
      color: #5D4037;
    }

    footer {
      background-color: #3E2723;
      color: #FFF5E1;
    }

    /* Search Bar */
    .form-control {
      border-color: #5D4037;
      color: #5D4037;
    }
  </style>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

  <nav class="navbar custom-navbar px-3">
    <span class="navbar-brand fw-bold">Recipe Tracker</span>
    <div class="ms-auto">
      <button class="btn btn-outline-dark">Stats</button>
    </div>
  </nav>

  <div class="container mt-4 flex-grow-1">

    <!-- Search bar and add button -->
    <div class="row mb-3">
      <div class="col-md-8 mb-2">
        <input type="text" class="form-control" placeholder="Search recipes...">
      </div>
      <div class="col-md-4 mb-2 text-end">
        <button class="btn add-btn">+ Add Recipe</button>
      </div>
    </div>

    <!-- Recipies -->
    <div class="row">
      <div class="col-md-4 mb-3">
        <div class="card shadow-sm">
          <div class="recipe-title-bar">Sample Recipe</div>
          <img src="https://via.placeholder.com/300x150" class="card-img-top">
          <div class="card-body">
            <p class="card-text">Category • 30 mins</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="row text-center mt-4">
      <div class="col-md-4 mb-3">
        <div class="card card-stats p-3">
          <h5>Total Recipes</h5>
          <h2>0</h2>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <div class="card card-stats p-3">
          <h5>Categories</h5>
          <h2>0</h2>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <div class="card card-stats p-3">
          <h5>Favorites</h5>
          <h2>0</h2>
        </div>
      </div>
    </div>

    <!-- Recent -->
    <div class="mt-4">
      <h4>Recently Added</h4>
      <ul class="list-group">
        <li class="list-group-item">No recipes yet</li>
      </ul>
    </div>

  </div> 

  <footer class="text-center py-3 mt-auto">
    <p class="mb-1">Contact Us!</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
