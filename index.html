<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Tracker Dashboard</title>

  <!-- Bootstrap & CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel = "stylesheet" href="./styles.css">

</head>

<body class="bg-light d-flex flex-column min-vh-100">

  <nav class="navbar custom-navbar px-3">
    <span class="navbar-brand fw-bold">Recipe Tracker</span>
    <div class="ms-auto">
      <button class="btn btn-outline-dark">Stats</button>
    </div>
  </nav>

  <div class="container mt-4 flex-grow-1">

    <!-- Search bar and add button -->
    <div class="row mb-3">
      <div class="col-md-8 mb-2">
        <input type="text" class="form-control" placeholder="Search recipes...">
      </div>
      <div class="col-md-4 mb-2 text-end">
        <button class="btn add-btn">+ Add Recipe</button>
      </div>
    </div>

<!-- filter bar -->
<div class="row mb-3 filter-bar align-items-center">

  <!-- category dropdown -->
  <div class="col-sm-6 col-md-3 mb-2">
    <select id="filter-category" class="form-select">
      <option value="">All Categories</option>
      <option value="breakfast">Dessert</option>
      <option value="lunch">Dinner</option>
      <option value="dinner">Lunch</option>
      <option value="dessert">Breakfast</option>
      <option value="snacks">Snacks</option>
      <option value="n/a">N/A</option>
    </select>
  </div>

  <!-- sort dropdown -->
  <div class="col-sm-6 col-md-3 mb-2">
    <select id="filter-sort" class="form-select">
      <option value="">Sort By</option>
      <option value="name-asc">Name (A → Z)</option>
      <option value="name-desc">Name (Z → A)</option>
      <option value="time-asc">Cook Time (Low → High)</option>
      <option value="time-desc">Cook Time (High → Low)</option>
      <option value="date-asc">Date Added (Oldest First)</option>
      <option value="date-desc">Date Added (Newest First)</option>
    </select>
  </div>

  <!-- favorites only toggle/placeholder -->
  <div class="col-sm-6 col-md-3 mb-2 d-flex align-items-center gap-2">
    <div class="form-check form-switch mb-0">
      <input class="form-check-input" type="checkbox" id="filter-favorites">
      <label class="form-check-label" for="filter-favorites">Favorites Only</label>
    </div>
  </div>

  <!-- result hint and clear button -->
  <div class="col-sm-6 col-md-3 mb-2 d-flex align-items-center justify-content-end gap-2">
    <span id="filter-hint" class="filter-hint"></span>
    <button id="clear-filters-btn" class="btn btn-sm clear-btn">✕ Clear</button>
  </div>
</div>
    
    <!-- Recipes -->
    <div class="row">
      <div class="col-md-4 mb-3">
        <div class="card shadow-sm">
          <div class="recipe-title-bar">Sample Recipe</div>
          <img src="https://via.placeholder.com/300x150" class="card-img-top">
          <div class="card-body">
            <p class="card-text">Category • 30 mins</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="row text-center mt-4">
      <div class="col-md-4 mb-3">
        <div class="card card-stats p-3">
          <h5>Total Recipes</h5>
          <h2>0</h2>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <div class="card card-stats p-3">
          <h5>Categories</h5>
          <h2>0</h2>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <div class="card card-stats p-3">
          <h5>Favorites</h5>
          <h2>0</h2>
        </div>
      </div>
    </div>

    <div class="mt-4">
      <h4>Recently Added</h4>
      <ul class="list-group">
        <li class="list-group-item">No recipes yet</li>
      </ul>
    </div>

  </div> 

  <footer class="text-center py-3 mt-auto">
    <p class="mb-1">Contact Us!</p>
  </footer>

  <!-- Bootstrap JS, JQuery, and JS scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="./app.js"></script>

</body>
</html>
