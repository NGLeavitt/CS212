<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Statistics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/group_5_recipe_tracker/style.css">
</head>
<body>
  <nav class="navbar custom-navbar justify-content-center">
    <h1 class="fw-bold mb-0">CATALOG STATISTICS</h1>
  </nav>

  <div class="container mt-5 text-center">
    <div class="row justify-content-center g-4">
      <div class="col-md-4">
        <div class="stat-container">
          <h2 id="st-total" class="display-4 fw-bold">0</h2>
          <p class="mb-0 text-uppercase">Total Entries</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-container">
          <h2 id="st-cat" class="display-4 fw-bold">0</h2>
          <p class="mb-0 text-uppercase">Unique Categories</p>
        </div>
      </div>
    </div>
    <div class="mt-5">
        <button class="btn btn-outline-custom" onclick="window.location.href='index.html'">Return Home</button>
    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="/group_5_recipe_tracker/app.js"></script>
  <script>
    $(document).ready(function() {
      $("#st-total").text(savedRecipes.length);
      $("#st-cat").text(new Set(savedRecipes.map(r => r.category)).size);
    });
  </script>
</body>
</html>
