<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add New Recipe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/group_5_recipe_tracker/style.css">
</head>
<body class="bg-light">
  <nav class="navbar custom-navbar px-3">
    <a href="index.html" class="btn btn-sm btn-outline-dark me-2">Back</a>
    <span class="navbar-brand fw-bold">Create New Recipe</span>
  </nav>

  <div class="container mt-4 mb-5">
    <div class="card shadow-sm p-4">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Recipe Name</label>
          <input type="text" id="add-recipe-form-name" class="form-control" placeholder="e.g. Grandma's Pasta">
        </div>
        <div class="col-md-3">
          <label class="form-label">Category</label>
          <select id="add-recipe-form-category" class="form-select">
            <option value="Breakfast">Breakfast</option>
            <option value="Lunch">Lunch</option>
            <option value="Dinner">Dinner</option>
            <option value="Dessert">Dessert</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Cook Time</label>
          <input type="text" id="add-recipe-form-cook-time" class="form-control" placeholder="e.g. 30 mins">
        </div>
        <div class="col-md-6">
          <label class="form-label">Servings</label>
          <input type="number" id="add-recipe-form-servings" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Allergens</label>
          <input type="text" id="add-recipe-form-allergens" class="form-control" placeholder="None, Nuts, Dairy...">
        </div>

        <div class="col-12">
          <label class="form-label d-flex justify-content-between">
            Ingredients <button class="btn btn-sm btn-outline-primary" onclick="AddIngredientInput()">+ Add</button>
          </label>
          <div id="add-recipe-form-ingredients-div">
            <input type="text" class="form-control mb-2" id="add-recipe-form-ingredient1">
            <input type="text" class="form-control mb-2" id="add-recipe-form-ingredient2">
          </div>
        </div>

        <div class="col-12">
          <label class="form-label d-flex justify-content-between">
            Instructions <button class="btn btn-sm btn-outline-primary" onclick="AddInstructionInput()">+ Add</button>
          </label>
          <div id="add-recipe-form-instructions-div">
            <input type="text" class="form-control mb-2" id="add-recipe-form-instruction1">
            <input type="text" class="form-control mb-2" id="add-recipe-form-instruction2">
          </div>
        </div>

        <div class="col-12 text-center mt-4">
          <button class="btn btn-lg add-btn px-5" onclick="AddRecipe()">Save Recipe</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="/group_5_recipe_tracker/app.js"></script>
</body>
</html>
